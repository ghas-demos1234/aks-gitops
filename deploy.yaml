apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  namespace: default
  labels:
    app: demo-web
spec:
  replicas: 5
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.28
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-web-lb
  namespace: default
  labels:
    app: demo-web
spec:
  type: LoadBalancer
  selector:
    app: demo-web
  ports:
    - name: http
      port: 80
      targetPort: 80
